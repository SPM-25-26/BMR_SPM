name: Tests (Server + Client)

on:
  push:
    branches: ["**"]
    paths:
      - "Eppoi.Server/**"
      - "Eppoi.Server.Tests/**"
      - "Models/**"
      - "eppoi.client/**"
      - ".github/workflows/tests.yml"
  pull_request:
    paths:
      - "Eppoi.Server/**"
      - "Eppoi.Server.Tests/**"
      - "Models/**"
      - "eppoi.client/**"
      - ".github/workflows/tests.yml"
  workflow_dispatch:

jobs:
  server-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore Eppoi.Server.Tests/Eppoi.Server.Tests.csproj

      - name: Build
        run: dotnet build Eppoi.Server.Tests/Eppoi.Server.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test Eppoi.Server.Tests/Eppoi.Server.Tests.csproj --configuration Release --no-build

  client-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: eppoi.client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: eppoi.client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test (Vitest)
        run: npm run test -- --run